#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu HC Light
# Generated by senzu

[app]
overall = { fg = "#000000", bg = "#fafafa" }

[mgr]
cwd = { fg = "#306070", bold = true }
find_keyword = { fg = "#7a5000", bold = true, italic = true, underline = true }
find_position = { fg = "#4a2090", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#306070", italic = true }
marker_copied = { fg = "#1f5d10", bg = "#1f5d10" }
marker_cut = { fg = "#c00000", bg = "#c00000" }
marker_marked = { fg = "#0a4a8a", bg = "#0a4a8a" }
marker_selected = { fg = "#7a5000", bg = "#7a5000" }
count_copied = { fg = "#fafafa", bg = "#1f5d10" }
count_cut = { fg = "#fafafa", bg = "#c00000" }
count_selected = { fg = "#fafafa", bg = "#7a5000" }
border_style = { fg = "#e0e0e0" }

[tabs]
active = { fg = "#fafafa", bg = "#0a3a8a", bold = true }
inactive = { fg = "#605958", bg = "#fafafa" }

[mode]
normal_main = { fg = "#fafafa", bg = "#0a3a8a", bold = true }
normal_alt = { fg = "#0a3a8a", bg = "#fafafa" }
select_main = { fg = "#fafafa", bg = "#306070", bold = true }
select_alt = { fg = "#306070", bg = "#fafafa" }
unset_main = { fg = "#fafafa", bg = "#c00000", bold = true }
unset_alt = { fg = "#c00000", bg = "#fafafa" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#0a3a8a" }
preview = { fg = "#306070" }

[status]
overall = { fg = "#000000", bg = "#fafafa" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#1a3a80" }
perm_read = { fg = "#7a5000" }
perm_write = { fg = "#c00000" }
perm_exec = { fg = "#1f5d10" }
progress_label = { fg = "#000000", bold = true }
progress_normal = { fg = "#1f5d10", bg = "#fafafa" }
progress_error = { fg = "#8a4a00", bg = "#c00000" }

[which]
mask = { bg = "#f0f0f0" }
cand = { fg = "#306070" }
rest = { fg = "#605958" }
desc = { fg = "#4a2090" }
separator_style = { fg = "#e0e0e0" }

[confirm]
border = { fg = "#0a3a8a" }
title = { fg = "#0a3a8a", bold = true }
body = { fg = "#000000" }
list = { fg = "#000000" }
btn_yes = { fg = "#fafafa", bg = "#1f5d10", bold = true }
btn_no = { fg = "#000000", bg = "#fafafa" }

[spot]
border = { fg = "#0a3a8a" }
title = { fg = "#0a3a8a", bold = true }
tbl_col = { fg = "#306070" }
tbl_cell = { fg = "#7a5000", bg = "#fafafa" }

[notify]
title_info = { fg = "#1f5d10" }
title_warn = { fg = "#8a4a00" }
title_error = { fg = "#c00000" }

[pick]
border = { fg = "#0a3a8a" }
active = { fg = "#4a2090", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#0a3a8a" }
title = { fg = "#000000" }
value = { fg = "#000000" }
selected = { fg = "#000000", bg = "#e8d0c0" }

[cmp]
border = { fg = "#0a3a8a" }
active = { fg = "#000000", bg = "#e8d0c0" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#0a3a8a" }
title = { fg = "#000000" }
hovered = { fg = "#4a2090", bold = true }

[help]
on = { fg = "#306070" }
run = { fg = "#4a2090" }
desc = { fg = "#000000" }
hovered = { fg = "#000000", bg = "#e8d0c0", bold = true }
footer = { fg = "#fafafa", bg = "#000000" }

[filetype]
rules = [
  { mime = "image/*", fg = "#306070" },
  { mime = "{audio,video}/*", fg = "#4a2090" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c00000" },
  { mime = "application/{pdf,doc,rtf}", fg = "#7a5000" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#c00000" },
  { url = "*", is = "exec", fg = "#1f5d10" },
  { url = "*/", fg = "#1a3a80" },
  { url = "*", fg = "#000000" },
]
