#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu HC
# Generated by senzu

[app]
overall = { fg = "#f8f8f0", bg = "#060606" }

[mgr]
cwd = { fg = "#78a0b8", bold = true }
find_keyword = { fg = "#ffe080", bold = true, italic = true, underline = true }
find_position = { fg = "#d8c8ff", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#78a0b8", italic = true }
marker_copied = { fg = "#c0f060", bg = "#c0f060" }
marker_cut = { fg = "#ff5050", bg = "#ff5050" }
marker_marked = { fg = "#60b8ff", bg = "#60b8ff" }
marker_selected = { fg = "#ffe080", bg = "#ffe080" }
count_copied = { fg = "#060606", bg = "#c0f060" }
count_cut = { fg = "#060606", bg = "#ff5050" }
count_selected = { fg = "#060606", bg = "#ffe080" }
border_style = { fg = "#282828" }

[tabs]
active = { fg = "#060606", bg = "#c0e0ff", bold = true }
inactive = { fg = "#605958", bg = "#060606" }

[mode]
normal_main = { fg = "#060606", bg = "#c0e0ff", bold = true }
normal_alt = { fg = "#c0e0ff", bg = "#060606" }
select_main = { fg = "#060606", bg = "#78a0b8", bold = true }
select_alt = { fg = "#78a0b8", bg = "#060606" }
unset_main = { fg = "#060606", bg = "#ff5050", bold = true }
unset_alt = { fg = "#ff5050", bg = "#060606" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#c0e0ff" }
preview = { fg = "#78a0b8" }

[status]
overall = { fg = "#f8f8f0", bg = "#060606" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#98b0e0" }
perm_read = { fg = "#ffe080" }
perm_write = { fg = "#ff5050" }
perm_exec = { fg = "#c0f060" }
progress_label = { fg = "#f8f8f0", bold = true }
progress_normal = { fg = "#c0f060", bg = "#060606" }
progress_error = { fg = "#ffc800", bg = "#ff5050" }

[which]
mask = { bg = "#0e0e0e" }
cand = { fg = "#78a0b8" }
rest = { fg = "#605958" }
desc = { fg = "#d8c8ff" }
separator_style = { fg = "#282828" }

[confirm]
border = { fg = "#c0e0ff" }
title = { fg = "#c0e0ff", bold = true }
body = { fg = "#f8f8f0" }
list = { fg = "#f8f8f0" }
btn_yes = { fg = "#060606", bg = "#c0f060", bold = true }
btn_no = { fg = "#f8f8f0", bg = "#060606" }

[spot]
border = { fg = "#c0e0ff" }
title = { fg = "#c0e0ff", bold = true }
tbl_col = { fg = "#78a0b8" }
tbl_cell = { fg = "#ffe080", bg = "#060606" }

[notify]
title_info = { fg = "#c0f060" }
title_warn = { fg = "#ffc800" }
title_error = { fg = "#ff5050" }

[pick]
border = { fg = "#c0e0ff" }
active = { fg = "#d8c8ff", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#c0e0ff" }
title = { fg = "#f8f8f0" }
value = { fg = "#f8f8f0" }
selected = { fg = "#f8f8f0", bg = "#303030" }

[cmp]
border = { fg = "#c0e0ff" }
active = { fg = "#f8f8f0", bg = "#303030" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#c0e0ff" }
title = { fg = "#f8f8f0" }
hovered = { fg = "#d8c8ff", bold = true }

[help]
on = { fg = "#78a0b8" }
run = { fg = "#d8c8ff" }
desc = { fg = "#f8f8f0" }
hovered = { fg = "#f8f8f0", bg = "#303030", bold = true }
footer = { fg = "#060606", bg = "#f8f8f0" }

[filetype]
rules = [
  { mime = "image/*", fg = "#78a0b8" },
  { mime = "{audio,video}/*", fg = "#d8c8ff" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff5050" },
  { mime = "application/{pdf,doc,rtf}", fg = "#ffe080" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#ff5050" },
  { url = "*", is = "exec", fg = "#c0f060" },
  { url = "*/", fg = "#98b0e0" },
  { url = "*", fg = "#f8f8f0" },
]
