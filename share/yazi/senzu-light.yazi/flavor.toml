#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Light
# Generated by senzu

[app]
overall = { fg = "#252525", bg = "#f5e6d3" }

[mgr]
cwd = { fg = "#2B5B77", bold = true }
find_keyword = { fg = "#876820", bold = true, italic = true, underline = true }
find_position = { fg = "#6a4abd", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#2B5B77", italic = true }
marker_copied = { fg = "#386014", bg = "#386014" }
marker_cut = { fg = "#ff3333", bg = "#ff3333" }
marker_marked = { fg = "#1670af", bg = "#1670af" }
marker_selected = { fg = "#876820", bg = "#876820" }
count_copied = { fg = "#f5e6d3", bg = "#386014" }
count_cut = { fg = "#f5e6d3", bg = "#ff3333" }
count_selected = { fg = "#f5e6d3", bg = "#876820" }
border_style = { fg = "#d0ccd1" }

[tabs]
active = { fg = "#f5e6d3", bg = "#234291", bold = true }
inactive = { fg = "#605958", bg = "#f5e6d3" }

[mode]
normal_main = { fg = "#f5e6d3", bg = "#234291", bold = true }
normal_alt = { fg = "#234291", bg = "#f5e6d3" }
select_main = { fg = "#f5e6d3", bg = "#2B5B77", bold = true }
select_alt = { fg = "#2B5B77", bg = "#f5e6d3" }
unset_main = { fg = "#f5e6d3", bg = "#ff3333", bold = true }
unset_alt = { fg = "#ff3333", bg = "#f5e6d3" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#234291" }
preview = { fg = "#2B5B77" }

[status]
overall = { fg = "#252525", bg = "#f5e6d3" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#2952a3" }
perm_read = { fg = "#876820" }
perm_write = { fg = "#ff3333" }
perm_exec = { fg = "#386014" }
progress_label = { fg = "#252525", bold = true }
progress_normal = { fg = "#386014", bg = "#f5e6d3" }
progress_error = { fg = "#a66510", bg = "#ff3333" }

[which]
mask = { bg = "#e8d5c0" }
cand = { fg = "#2B5B77" }
rest = { fg = "#605958" }
desc = { fg = "#6a4abd" }
separator_style = { fg = "#d0ccd1" }

[confirm]
border = { fg = "#234291" }
title = { fg = "#234291", bold = true }
body = { fg = "#252525" }
list = { fg = "#252525" }
btn_yes = { fg = "#f5e6d3", bg = "#386014", bold = true }
btn_no = { fg = "#252525", bg = "#f5e6d3" }

[spot]
border = { fg = "#234291" }
title = { fg = "#234291", bold = true }
tbl_col = { fg = "#2B5B77" }
tbl_cell = { fg = "#876820", bg = "#f5e6d3" }

[notify]
title_info = { fg = "#386014" }
title_warn = { fg = "#a66510" }
title_error = { fg = "#ff3333" }

[pick]
border = { fg = "#234291" }
active = { fg = "#6a4abd", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#234291" }
title = { fg = "#252525" }
value = { fg = "#252525" }
selected = { fg = "#252525", bg = "#d7af87" }

[cmp]
border = { fg = "#234291" }
active = { fg = "#252525", bg = "#d7af87" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#234291" }
title = { fg = "#252525" }
hovered = { fg = "#6a4abd", bold = true }

[help]
on = { fg = "#2B5B77" }
run = { fg = "#6a4abd" }
desc = { fg = "#252525" }
hovered = { fg = "#252525", bg = "#d7af87", bold = true }
footer = { fg = "#f5e6d3", bg = "#252525" }

[filetype]
rules = [
  { mime = "image/*", fg = "#2B5B77" },
  { mime = "{audio,video}/*", fg = "#6a4abd" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff3333" },
  { mime = "application/{pdf,doc,rtf}", fg = "#876820" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#ff3333" },
  { url = "*", is = "exec", fg = "#386014" },
  { url = "*/", fg = "#2952a3" },
  { url = "*", fg = "#252525" },
]
