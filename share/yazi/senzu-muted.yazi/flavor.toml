#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Muted
# Generated by senzu

[app]
overall = { fg = "#dad6c8", bg = "#101010" }

[mgr]
cwd = { fg = "#617b87", bold = true }
find_keyword = { fg = "#e8c88c", bold = true, italic = true, underline = true }
find_position = { fg = "#b8aed3", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#617b87", italic = true }
marker_copied = { fg = "#98b67c", bg = "#98b67c" }
marker_cut = { fg = "#cc4d4d", bg = "#cc4d4d" }
marker_marked = { fg = "#7db7cc", bg = "#7db7cc" }
marker_selected = { fg = "#e8c88c", bg = "#e8c88c" }
count_copied = { fg = "#101010", bg = "#98b67c" }
count_cut = { fg = "#101010", bg = "#cc4d4d" }
count_selected = { fg = "#101010", bg = "#e8c88c" }
border_style = { fg = "#3c3936" }

[tabs]
active = { fg = "#101010", bg = "#a6c3d9", bold = true }
inactive = { fg = "#58534f", bg = "#101010" }

[mode]
normal_main = { fg = "#101010", bg = "#a6c3d9", bold = true }
normal_alt = { fg = "#a6c3d9", bg = "#101010" }
select_main = { fg = "#101010", bg = "#617b87", bold = true }
select_alt = { fg = "#617b87", bg = "#101010" }
unset_main = { fg = "#101010", bg = "#cc4d4d", bold = true }
unset_alt = { fg = "#cc4d4d", bg = "#101010" }

[indicator]
parent = { fg = "#58534f" }
current = { fg = "#a6c3d9" }
preview = { fg = "#617b87" }

[status]
overall = { fg = "#dad6c8", bg = "#101010" }
perm_sep = { fg = "#58534f" }
perm_type = { fg = "#7a8aa6" }
perm_read = { fg = "#e8c88c" }
perm_write = { fg = "#cc4d4d" }
perm_exec = { fg = "#98b67c" }
progress_label = { fg = "#dad6c8", bold = true }
progress_normal = { fg = "#98b67c", bg = "#101010" }
progress_error = { fg = "#d9a45a", bg = "#cc4d4d" }

[which]
mask = { bg = "#1e1e1c" }
cand = { fg = "#617b87" }
rest = { fg = "#58534f" }
desc = { fg = "#b8aed3" }
separator_style = { fg = "#3c3936" }

[confirm]
border = { fg = "#a6c3d9" }
title = { fg = "#a6c3d9", bold = true }
body = { fg = "#dad6c8" }
list = { fg = "#dad6c8" }
btn_yes = { fg = "#101010", bg = "#98b67c", bold = true }
btn_no = { fg = "#dad6c8", bg = "#101010" }

[spot]
border = { fg = "#a6c3d9" }
title = { fg = "#a6c3d9", bold = true }
tbl_col = { fg = "#617b87" }
tbl_cell = { fg = "#e8c88c", bg = "#101010" }

[notify]
title_info = { fg = "#98b67c" }
title_warn = { fg = "#d9a45a" }
title_error = { fg = "#cc4d4d" }

[pick]
border = { fg = "#a6c3d9" }
active = { fg = "#b8aed3", bold = true }
inactive = { fg = "#58534f" }

[input]
border = { fg = "#a6c3d9" }
title = { fg = "#dad6c8" }
value = { fg = "#dad6c8" }
selected = { fg = "#dad6c8", bg = "#3c3b38" }

[cmp]
border = { fg = "#a6c3d9" }
active = { fg = "#dad6c8", bg = "#3c3b38" }
inactive = { fg = "#58534f" }

[tasks]
border = { fg = "#a6c3d9" }
title = { fg = "#dad6c8" }
hovered = { fg = "#b8aed3", bold = true }

[help]
on = { fg = "#617b87" }
run = { fg = "#b8aed3" }
desc = { fg = "#dad6c8" }
hovered = { fg = "#dad6c8", bg = "#3c3b38", bold = true }
footer = { fg = "#101010", bg = "#dad6c8" }

[filetype]
rules = [
  { mime = "image/*", fg = "#617b87" },
  { mime = "{audio,video}/*", fg = "#b8aed3" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#cc4d4d" },
  { mime = "application/{pdf,doc,rtf}", fg = "#e8c88c" },
  { mime = "vfs/{absent,stale}", fg = "#58534f" },
  { url = "*", is = "orphan", bg = "#cc4d4d" },
  { url = "*", is = "exec", fg = "#98b67c" },
  { url = "*/", fg = "#7a8aa6" },
  { url = "*", fg = "#dad6c8" },
]
