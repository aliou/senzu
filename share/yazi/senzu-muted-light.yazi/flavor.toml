#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Muted Light
# Generated by senzu

[app]
overall = { fg = "#2d2c2a", bg = "#f7f3eb" }

[mgr]
cwd = { fg = "#3c5971", bold = true }
find_keyword = { fg = "#987b40", bold = true, italic = true, underline = true }
find_position = { fg = "#655683", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#3c5971", italic = true }
marker_copied = { fg = "#4d7134", bg = "#4d7134" }
marker_cut = { fg = "#b84949", bg = "#b84949" }
marker_marked = { fg = "#3a6f8c", bg = "#3a6f8c" }
marker_selected = { fg = "#987b40", bg = "#987b40" }
count_copied = { fg = "#f7f3eb", bg = "#4d7134" }
count_cut = { fg = "#f7f3eb", bg = "#b84949" }
count_selected = { fg = "#f7f3eb", bg = "#987b40" }
border_style = { fg = "#d0cdc6" }

[tabs]
active = { fg = "#f7f3eb", bg = "#334a84", bold = true }
inactive = { fg = "#5c5650", bg = "#f7f3eb" }

[mode]
normal_main = { fg = "#f7f3eb", bg = "#334a84", bold = true }
normal_alt = { fg = "#334a84", bg = "#f7f3eb" }
select_main = { fg = "#f7f3eb", bg = "#3c5971", bold = true }
select_alt = { fg = "#3c5971", bg = "#f7f3eb" }
unset_main = { fg = "#f7f3eb", bg = "#b84949", bold = true }
unset_alt = { fg = "#b84949", bg = "#f7f3eb" }

[indicator]
parent = { fg = "#5c5650" }
current = { fg = "#334a84" }
preview = { fg = "#3c5971" }

[status]
overall = { fg = "#2d2c2a", bg = "#f7f3eb" }
perm_sep = { fg = "#5c5650" }
perm_type = { fg = "#445987" }
perm_read = { fg = "#987b40" }
perm_write = { fg = "#b84949" }
perm_exec = { fg = "#4d7134" }
progress_label = { fg = "#2d2c2a", bold = true }
progress_normal = { fg = "#4d7134", bg = "#f7f3eb" }
progress_error = { fg = "#9a7345", bg = "#b84949" }

[which]
mask = { bg = "#ebe7df" }
cand = { fg = "#3c5971" }
rest = { fg = "#5c5650" }
desc = { fg = "#655683" }
separator_style = { fg = "#d0cdc6" }

[confirm]
border = { fg = "#334a84" }
title = { fg = "#334a84", bold = true }
body = { fg = "#2d2c2a" }
list = { fg = "#2d2c2a" }
btn_yes = { fg = "#f7f3eb", bg = "#4d7134", bold = true }
btn_no = { fg = "#2d2c2a", bg = "#f7f3eb" }

[spot]
border = { fg = "#334a84" }
title = { fg = "#334a84", bold = true }
tbl_col = { fg = "#3c5971" }
tbl_cell = { fg = "#987b40", bg = "#f7f3eb" }

[notify]
title_info = { fg = "#4d7134" }
title_warn = { fg = "#9a7345" }
title_error = { fg = "#b84949" }

[pick]
border = { fg = "#334a84" }
active = { fg = "#655683", bold = true }
inactive = { fg = "#5c5650" }

[input]
border = { fg = "#334a84" }
title = { fg = "#2d2c2a" }
value = { fg = "#2d2c2a" }
selected = { fg = "#2d2c2a", bg = "#c9b99a" }

[cmp]
border = { fg = "#334a84" }
active = { fg = "#2d2c2a", bg = "#c9b99a" }
inactive = { fg = "#5c5650" }

[tasks]
border = { fg = "#334a84" }
title = { fg = "#2d2c2a" }
hovered = { fg = "#655683", bold = true }

[help]
on = { fg = "#3c5971" }
run = { fg = "#655683" }
desc = { fg = "#2d2c2a" }
hovered = { fg = "#2d2c2a", bg = "#c9b99a", bold = true }
footer = { fg = "#f7f3eb", bg = "#2d2c2a" }

[filetype]
rules = [
  { mime = "image/*", fg = "#3c5971" },
  { mime = "{audio,video}/*", fg = "#655683" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#b84949" },
  { mime = "application/{pdf,doc,rtf}", fg = "#987b40" },
  { mime = "vfs/{absent,stale}", fg = "#5c5650" },
  { url = "*", is = "orphan", bg = "#b84949" },
  { url = "*", is = "exec", fg = "#4d7134" },
  { url = "*/", fg = "#445987" },
  { url = "*", fg = "#2d2c2a" },
]
