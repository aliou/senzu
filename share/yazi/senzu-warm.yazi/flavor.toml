#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Warm
# Generated by senzu

[app]
overall = { fg = "#edd9b8", bg = "#1c1510" }

[mgr]
cwd = { fg = "#668799", bold = true }
find_keyword = { fg = "#fad07a", bold = true, italic = true, underline = true }
find_position = { fg = "#c6b6ee", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#668799", italic = true }
marker_copied = { fg = "#afd787", bg = "#afd787" }
marker_cut = { fg = "#d74545", bg = "#d74545" }
marker_marked = { fg = "#5f9ecf", bg = "#5f9ecf" }
marker_selected = { fg = "#fad07a", bg = "#fad07a" }
count_copied = { fg = "#1c1510", bg = "#afd787" }
count_cut = { fg = "#1c1510", bg = "#d74545" }
count_selected = { fg = "#1c1510", bg = "#fad07a" }
border_style = { fg = "#3c2c1c" }

[tabs]
active = { fg = "#1c1510", bg = "#c8b878", bold = true }
inactive = { fg = "#6a5a50", bg = "#1c1510" }

[mode]
normal_main = { fg = "#1c1510", bg = "#c8b878", bold = true }
normal_alt = { fg = "#c8b878", bg = "#1c1510" }
select_main = { fg = "#1c1510", bg = "#668799", bold = true }
select_alt = { fg = "#668799", bg = "#1c1510" }
unset_main = { fg = "#1c1510", bg = "#d74545", bold = true }
unset_alt = { fg = "#d74545", bg = "#1c1510" }

[indicator]
parent = { fg = "#6a5a50" }
current = { fg = "#c8b878" }
preview = { fg = "#668799" }

[status]
overall = { fg = "#edd9b8", bg = "#1c1510" }
perm_sep = { fg = "#6a5a50" }
perm_type = { fg = "#8197bf" }
perm_read = { fg = "#fad07a" }
perm_write = { fg = "#d74545" }
perm_exec = { fg = "#afd787" }
progress_label = { fg = "#edd9b8", bold = true }
progress_normal = { fg = "#afd787", bg = "#1c1510" }
progress_error = { fg = "#ffaf00", bg = "#d74545" }

[which]
mask = { bg = "#241a10" }
cand = { fg = "#668799" }
rest = { fg = "#6a5a50" }
desc = { fg = "#c6b6ee" }
separator_style = { fg = "#3c2c1c" }

[confirm]
border = { fg = "#c8b878" }
title = { fg = "#c8b878", bold = true }
body = { fg = "#edd9b8" }
list = { fg = "#edd9b8" }
btn_yes = { fg = "#1c1510", bg = "#afd787", bold = true }
btn_no = { fg = "#edd9b8", bg = "#1c1510" }

[spot]
border = { fg = "#c8b878" }
title = { fg = "#c8b878", bold = true }
tbl_col = { fg = "#668799" }
tbl_cell = { fg = "#fad07a", bg = "#1c1510" }

[notify]
title_info = { fg = "#afd787" }
title_warn = { fg = "#ffaf00" }
title_error = { fg = "#d74545" }

[pick]
border = { fg = "#c8b878" }
active = { fg = "#c6b6ee", bold = true }
inactive = { fg = "#6a5a50" }

[input]
border = { fg = "#c8b878" }
title = { fg = "#edd9b8" }
value = { fg = "#edd9b8" }
selected = { fg = "#edd9b8", bg = "#4a3828" }

[cmp]
border = { fg = "#c8b878" }
active = { fg = "#edd9b8", bg = "#4a3828" }
inactive = { fg = "#6a5a50" }

[tasks]
border = { fg = "#c8b878" }
title = { fg = "#edd9b8" }
hovered = { fg = "#c6b6ee", bold = true }

[help]
on = { fg = "#668799" }
run = { fg = "#c6b6ee" }
desc = { fg = "#edd9b8" }
hovered = { fg = "#edd9b8", bg = "#4a3828", bold = true }
footer = { fg = "#1c1510", bg = "#edd9b8" }

[filetype]
rules = [
  { mime = "image/*", fg = "#668799" },
  { mime = "{audio,video}/*", fg = "#c6b6ee" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d74545" },
  { mime = "application/{pdf,doc,rtf}", fg = "#fad07a" },
  { mime = "vfs/{absent,stale}", fg = "#6a5a50" },
  { url = "*", is = "orphan", bg = "#d74545" },
  { url = "*", is = "exec", fg = "#afd787" },
  { url = "*/", fg = "#8197bf" },
  { url = "*", fg = "#edd9b8" },
]
