#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu
# Generated by senzu

[app]
overall = { fg = "#e8e8d3", bg = "#151515" }

[mgr]
cwd = { fg = "#668799", bold = true }
find_keyword = { fg = "#fad07a", bold = true, italic = true, underline = true }
find_position = { fg = "#c6b6ee", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#668799", italic = true }
marker_copied = { fg = "#afd787", bg = "#afd787" }
marker_cut = { fg = "#d74545", bg = "#d74545" }
marker_marked = { fg = "#5f9ecf", bg = "#5f9ecf" }
marker_selected = { fg = "#fad07a", bg = "#fad07a" }
count_copied = { fg = "#151515", bg = "#afd787" }
count_cut = { fg = "#151515", bg = "#d74545" }
count_selected = { fg = "#151515", bg = "#fad07a" }
border_style = { fg = "#403c41" }

[tabs]
active = { fg = "#151515", bg = "#b0d0f0", bold = true }
inactive = { fg = "#605958", bg = "#151515" }

[mode]
normal_main = { fg = "#151515", bg = "#b0d0f0", bold = true }
normal_alt = { fg = "#b0d0f0", bg = "#151515" }
select_main = { fg = "#151515", bg = "#668799", bold = true }
select_alt = { fg = "#668799", bg = "#151515" }
unset_main = { fg = "#151515", bg = "#d74545", bold = true }
unset_alt = { fg = "#d74545", bg = "#151515" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#b0d0f0" }
preview = { fg = "#668799" }

[status]
overall = { fg = "#e8e8d3", bg = "#151515" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#8197bf" }
perm_read = { fg = "#fad07a" }
perm_write = { fg = "#d74545" }
perm_exec = { fg = "#afd787" }
progress_label = { fg = "#e8e8d3", bold = true }
progress_normal = { fg = "#afd787", bg = "#151515" }
progress_error = { fg = "#ffaf00", bg = "#d74545" }

[which]
mask = { bg = "#1c1c1c" }
cand = { fg = "#668799" }
rest = { fg = "#605958" }
desc = { fg = "#c6b6ee" }
separator_style = { fg = "#403c41" }

[confirm]
border = { fg = "#b0d0f0" }
title = { fg = "#b0d0f0", bold = true }
body = { fg = "#e8e8d3" }
list = { fg = "#e8e8d3" }
btn_yes = { fg = "#151515", bg = "#afd787", bold = true }
btn_no = { fg = "#e8e8d3", bg = "#151515" }

[spot]
border = { fg = "#b0d0f0" }
title = { fg = "#b0d0f0", bold = true }
tbl_col = { fg = "#668799" }
tbl_cell = { fg = "#fad07a", bg = "#151515" }

[notify]
title_info = { fg = "#afd787" }
title_warn = { fg = "#ffaf00" }
title_error = { fg = "#d74545" }

[pick]
border = { fg = "#b0d0f0" }
active = { fg = "#c6b6ee", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#b0d0f0" }
title = { fg = "#e8e8d3" }
value = { fg = "#e8e8d3" }
selected = { fg = "#e8e8d3", bg = "#404040" }

[cmp]
border = { fg = "#b0d0f0" }
active = { fg = "#e8e8d3", bg = "#404040" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#b0d0f0" }
title = { fg = "#e8e8d3" }
hovered = { fg = "#c6b6ee", bold = true }

[help]
on = { fg = "#668799" }
run = { fg = "#c6b6ee" }
desc = { fg = "#e8e8d3" }
hovered = { fg = "#e8e8d3", bg = "#404040", bold = true }
footer = { fg = "#151515", bg = "#e8e8d3" }

[filetype]
rules = [
  { mime = "image/*", fg = "#668799" },
  { mime = "{audio,video}/*", fg = "#c6b6ee" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d74545" },
  { mime = "application/{pdf,doc,rtf}", fg = "#fad07a" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#d74545" },
  { url = "*", is = "exec", fg = "#afd787" },
  { url = "*/", fg = "#8197bf" },
  { url = "*", fg = "#e8e8d3" },
]
