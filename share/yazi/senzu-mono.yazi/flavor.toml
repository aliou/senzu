#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Mono
# Generated by senzu

[app]
overall = { fg = "#e8e8d3", bg = "#151515" }

[mgr]
cwd = { fg = "#556779", bold = true }
find_keyword = { fg = "#ccc5c4", bold = true, italic = true, underline = true }
find_position = { fg = "#c7c7c7", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#556779", italic = true }
marker_copied = { fg = "#afd787", bg = "#afd787" }
marker_cut = { fg = "#c95c5c", bg = "#c95c5c" }
marker_marked = { fg = "#7a8aa6", bg = "#7a8aa6" }
marker_selected = { fg = "#ccc5c4", bg = "#ccc5c4" }
count_copied = { fg = "#151515", bg = "#afd787" }
count_cut = { fg = "#151515", bg = "#c95c5c" }
count_selected = { fg = "#151515", bg = "#ccc5c4" }
border_style = { fg = "#403c41" }

[tabs]
active = { fg = "#151515", bg = "#7a8aa6", bold = true }
inactive = { fg = "#605958", bg = "#151515" }

[mode]
normal_main = { fg = "#151515", bg = "#7a8aa6", bold = true }
normal_alt = { fg = "#7a8aa6", bg = "#151515" }
select_main = { fg = "#151515", bg = "#556779", bold = true }
select_alt = { fg = "#556779", bg = "#151515" }
unset_main = { fg = "#151515", bg = "#c95c5c", bold = true }
unset_alt = { fg = "#c95c5c", bg = "#151515" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#7a8aa6" }
preview = { fg = "#556779" }

[status]
overall = { fg = "#e8e8d3", bg = "#151515" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#7a8aa6" }
perm_read = { fg = "#ccc5c4" }
perm_write = { fg = "#c95c5c" }
perm_exec = { fg = "#afd787" }
progress_label = { fg = "#e8e8d3", bold = true }
progress_normal = { fg = "#afd787", bg = "#151515" }
progress_error = { fg = "#ffaf00", bg = "#c95c5c" }

[which]
mask = { bg = "#1c1c1c" }
cand = { fg = "#556779" }
rest = { fg = "#605958" }
desc = { fg = "#c7c7c7" }
separator_style = { fg = "#403c41" }

[confirm]
border = { fg = "#7a8aa6" }
title = { fg = "#7a8aa6", bold = true }
body = { fg = "#e8e8d3" }
list = { fg = "#e8e8d3" }
btn_yes = { fg = "#151515", bg = "#afd787", bold = true }
btn_no = { fg = "#e8e8d3", bg = "#151515" }

[spot]
border = { fg = "#7a8aa6" }
title = { fg = "#7a8aa6", bold = true }
tbl_col = { fg = "#556779" }
tbl_cell = { fg = "#ccc5c4", bg = "#151515" }

[notify]
title_info = { fg = "#afd787" }
title_warn = { fg = "#ffaf00" }
title_error = { fg = "#c95c5c" }

[pick]
border = { fg = "#7a8aa6" }
active = { fg = "#c7c7c7", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#7a8aa6" }
title = { fg = "#e8e8d3" }
value = { fg = "#e8e8d3" }
selected = { fg = "#e8e8d3", bg = "#404040" }

[cmp]
border = { fg = "#7a8aa6" }
active = { fg = "#e8e8d3", bg = "#404040" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#7a8aa6" }
title = { fg = "#e8e8d3" }
hovered = { fg = "#c7c7c7", bold = true }

[help]
on = { fg = "#556779" }
run = { fg = "#c7c7c7" }
desc = { fg = "#e8e8d3" }
hovered = { fg = "#e8e8d3", bg = "#404040", bold = true }
footer = { fg = "#151515", bg = "#e8e8d3" }

[filetype]
rules = [
  { mime = "image/*", fg = "#556779" },
  { mime = "{audio,video}/*", fg = "#c7c7c7" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c95c5c" },
  { mime = "application/{pdf,doc,rtf}", fg = "#ccc5c4" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#c95c5c" },
  { url = "*", is = "exec", fg = "#afd787" },
  { url = "*/", fg = "#7a8aa6" },
  { url = "*", fg = "#e8e8d3" },
]
