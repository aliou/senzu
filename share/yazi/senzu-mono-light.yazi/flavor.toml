#:schema https://yazi-rs.github.io/schemas/theme.json
# Senzu flavor: Senzu Mono Light
# Generated by senzu

[app]
overall = { fg = "#252525", bg = "#f5f0e8" }

[mgr]
cwd = { fg = "#576270", bold = true }
find_keyword = { fg = "#6a6564", bold = true, italic = true, underline = true }
find_position = { fg = "#555555", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#576270", italic = true }
marker_copied = { fg = "#3d6c25", bg = "#3d6c25" }
marker_cut = { fg = "#cc0000", bg = "#cc0000" }
marker_marked = { fg = "#0060a3", bg = "#0060a3" }
marker_selected = { fg = "#6a6564", bg = "#6a6564" }
count_copied = { fg = "#f5f0e8", bg = "#3d6c25" }
count_cut = { fg = "#f5f0e8", bg = "#cc0000" }
count_selected = { fg = "#f5f0e8", bg = "#6a6564" }
border_style = { fg = "#d0ccd1" }

[tabs]
active = { fg = "#f5f0e8", bg = "#4a5e81", bold = true }
inactive = { fg = "#605958", bg = "#f5f0e8" }

[mode]
normal_main = { fg = "#f5f0e8", bg = "#4a5e81", bold = true }
normal_alt = { fg = "#4a5e81", bg = "#f5f0e8" }
select_main = { fg = "#f5f0e8", bg = "#576270", bold = true }
select_alt = { fg = "#576270", bg = "#f5f0e8" }
unset_main = { fg = "#f5f0e8", bg = "#cc0000", bold = true }
unset_alt = { fg = "#cc0000", bg = "#f5f0e8" }

[indicator]
parent = { fg = "#605958" }
current = { fg = "#4a5e81" }
preview = { fg = "#576270" }

[status]
overall = { fg = "#252525", bg = "#f5f0e8" }
perm_sep = { fg = "#605958" }
perm_type = { fg = "#4a5e81" }
perm_read = { fg = "#6a6564" }
perm_write = { fg = "#cc0000" }
perm_exec = { fg = "#3d6c25" }
progress_label = { fg = "#252525", bold = true }
progress_normal = { fg = "#3d6c25", bg = "#f5f0e8" }
progress_error = { fg = "#a36000", bg = "#cc0000" }

[which]
mask = { bg = "#e8e0d5" }
cand = { fg = "#576270" }
rest = { fg = "#605958" }
desc = { fg = "#555555" }
separator_style = { fg = "#d0ccd1" }

[confirm]
border = { fg = "#4a5e81" }
title = { fg = "#4a5e81", bold = true }
body = { fg = "#252525" }
list = { fg = "#252525" }
btn_yes = { fg = "#f5f0e8", bg = "#3d6c25", bold = true }
btn_no = { fg = "#252525", bg = "#f5f0e8" }

[spot]
border = { fg = "#4a5e81" }
title = { fg = "#4a5e81", bold = true }
tbl_col = { fg = "#576270" }
tbl_cell = { fg = "#6a6564", bg = "#f5f0e8" }

[notify]
title_info = { fg = "#3d6c25" }
title_warn = { fg = "#a36000" }
title_error = { fg = "#cc0000" }

[pick]
border = { fg = "#4a5e81" }
active = { fg = "#555555", bold = true }
inactive = { fg = "#605958" }

[input]
border = { fg = "#4a5e81" }
title = { fg = "#252525" }
value = { fg = "#252525" }
selected = { fg = "#252525", bg = "#d8c8b8" }

[cmp]
border = { fg = "#4a5e81" }
active = { fg = "#252525", bg = "#d8c8b8" }
inactive = { fg = "#605958" }

[tasks]
border = { fg = "#4a5e81" }
title = { fg = "#252525" }
hovered = { fg = "#555555", bold = true }

[help]
on = { fg = "#576270" }
run = { fg = "#555555" }
desc = { fg = "#252525" }
hovered = { fg = "#252525", bg = "#d8c8b8", bold = true }
footer = { fg = "#f5f0e8", bg = "#252525" }

[filetype]
rules = [
  { mime = "image/*", fg = "#576270" },
  { mime = "{audio,video}/*", fg = "#555555" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#cc0000" },
  { mime = "application/{pdf,doc,rtf}", fg = "#6a6564" },
  { mime = "vfs/{absent,stale}", fg = "#605958" },
  { url = "*", is = "orphan", bg = "#cc0000" },
  { url = "*", is = "exec", fg = "#3d6c25" },
  { url = "*/", fg = "#4a5e81" },
  { url = "*", fg = "#252525" },
]
